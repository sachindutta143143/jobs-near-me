<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#07071a;color:#fff;min-height:100vh;padding:20px}
.hdr{padding:14px 20px;background:rgba(7,7,26,0.85);backdrop-filter:blur(20px);display:flex;align-items:center;gap:10px;border-radius:14px;margin-bottom:30px;border:1px solid #1e1e4a}
.bk{color:#94a3b8;text-decoration:none;padding:8px 14px;background:#1e1e4a;border-radius:10px}
.crd{background:linear-gradient(145deg,rgba(30,30,74,0.8),rgba(20,20,50,0.9));border:1px solid #1e1e4a;padding:30px;border-radius:20px;max-width:500px;margin:0 auto;text-align:center}
.crd .icon{font-size:50px;margin-bottom:15px}
.crd h2{margin-bottom:10px}
.crd p{color:#94a3b8;font-size:14px;line-height:1.8}
.link{display:inline-block;margin-top:15px;padding:12px 24px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:12px;color:#fff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="hdr"><a href="/" class="bk">← Home</a><span style="font-weight:600">Contact</span></div>
<div class="crd">
  <div class="icon">📬</div>
  <h2>Get in Touch</h2>
  <p>📧 admin@jobsnearme.com<br>📱 Telegram: @jobsnearme</p>
  <a href="mailto:admin@jobsnearme.com" class="link">Send Email →</a>
</div>
</body>
</html>
